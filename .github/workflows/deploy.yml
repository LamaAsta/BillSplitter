name: Deploy Frontend

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        working-directory: bill-splitter
        run: npm install

      - name: Build project
        working-directory: bill-splitter
        run: npm run build

      - name: Deploy to GitHub Pages
        working-directory: bill-splitter
        run: |
          npm install gh-pages --save-dev
          npx gh-pages -d dist